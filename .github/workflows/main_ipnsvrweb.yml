# Azure Web App Deployment with Auto Documentation Update
# 
# WHAT THIS WORKFLOW DOES:
# 1. Detects when documentation files (public/docs/*.md) change
# 2. Regenerates documentation.json 
# 3. Commits changes back to the repo (optional, requires write permissions)
# 4. Builds and deploys to Azure Web App
#
# ═══════════════════════════════════════════════════════════════════════════════
# SETUP OPTIONS:
# ═══════════════════════════════════════════════════════════════════════════════

name: Build and deploy Node.js app to Azure Web App - IPNSVRWEB

on:
  push:
    branches:
      - main
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════════════════════
# OPTION A: Enable Auto-Commit (RECOMMENDED)
# ───────────────────────────────────────────────────────────────────────────────
# Steps:
# 1. Go to: GitHub Repo > Settings > Actions > General
# 2. Under "Workflow permissions", select: "Read and write permissions"
# 3. Save changes
# 4. Uncomment the 'permissions:' block below (lines 35-36)
# ═══════════════════════════════════════════════════════════════════════════════

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 1: Update Documentation (if files changed)
  # ═══════════════════════════════════════════════════════════════════════════════
  update-docs:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.detect.outputs.docs_changed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for change detection
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── Step 1: Detect Changed Documentation Files ───
      - name: Detect changed files
        id: detect
        run: |
          # Get files changed in the last commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^public/docs/.*\.md$' || true)
          
          if [ -n "$CHANGED" ]; then
            echo "docs_changed=true" >> $GITHUB_OUTPUT
            echo "📄 Documentation files changed:"
            echo "$CHANGED" | sed 's/^/   • /'
          else
            echo "docs_changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No documentation files changed"
          fi

      # ─── Step 2: Setup Node.js and Update Docs ───
      - name: Setup Node.js
        if: steps.detect.outputs.docs_changed == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        if: steps.detect.outputs.docs_changed == 'true'
        run: npm install

      - name: Update documentation
        if: steps.detect.outputs.docs_changed == 'true'
        run: |
          echo "🔄 Generating documentation..."
          npm run generate-docs
          echo "✅ Documentation generated"

      # ═════════════════════════════════════════════════════════════════════════
      # Auto-Commit regenerated documentation
      # ═════════════════════════════════════════════════════════════════════════
      - name: Commit and push changes
        if: steps.detect.outputs.docs_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add src/data/documentation.json public/data/documentation.json
            git commit -m "🤖 Auto-regenerate documentation [skip ci]"
            git push
            echo "✅ Changes committed and pushed"
          else
            echo "ℹ️ No changes to commit"
          fi
      # 
      # ═════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 2: Build Application
  # ═══════════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: update-docs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install and build
        run: |
          npm install
          npm run generate-docs
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_measurementId: ${{ secrets.VITE_FIREBASE_measurementId }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  # ═══════════════════════════════════════════════════════════════════════════════
  # JOB 3: Deploy to Azure
  # ═══════════════════════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IPNSVRWEB'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DA18E8DC305C4251B3AD7A917F19138F }}

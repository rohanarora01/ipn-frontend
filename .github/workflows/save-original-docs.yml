name: Save Original Documentation

on:
  push:
    branches:
      - main
    paths:
      - '"'"'public/docs/**.md'"'"'

permissions:
  contents: write

jobs:
  save-original:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
      
      - name: Save original versions
        run: |
          mkdir -p public/docs/original
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '"'"'^public/docs/.*\.md$'"'"' || true)
          
          for file in $CHANGED; do
            filename=$(basename "$file")
            if git show HEAD~1:$file > /dev/null 2>&1; then
              git show HEAD~1:$file > "public/docs/original/$filename"
              echo "Saved original: $filename"
            fi
          done
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/docs/original/
          git diff --staged --quiet || (git commit -m "Save original docs [skip ci]" && git push)

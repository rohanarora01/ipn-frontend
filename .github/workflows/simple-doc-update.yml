# Simple Documentation Auto-Update
# When you push any .md file change, this regenerates documentation.json

name: Auto Update Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'public/docs/**.md'
      - 'SUMMARY.md'

permissions:
  contents: write

jobs:
  regenerate-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
      
      - name: Install dependencies
        run: npm install
      
      - name: Regenerate documentation
        run: |
          echo "🔄 Running: npm run generate-docs"
          npm run generate-docs
          echo "✅ Documentation regenerated!"
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "📝 Changes detected, committing..."
            git add src/data/documentation.json public/data/documentation.json
            git commit -m "🤖 Auto-regenerate documentation [skip ci]"
            git push
            echo "✅ Changes pushed to GitHub!"
          else
            echo "ℹ️ No changes to commit"
          fi

name: Backup Original Docs

on:
  push:
    branches: [main]
    paths: ['public/docs/**.md']

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Backup original files
        run: |
          mkdir -p public/docs/original
          git diff --name-only HEAD~1 HEAD | grep '^public/docs/.*\.md$' | while read file; do
            if git show HEAD~1:"$file" > /dev/null 2>&1; then
              cp "$file" "public/docs/original/$(basename $file)"
            fi
          done
      
      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/docs/original/
          git diff --cached --quiet || (git commit -m "Backup original docs [skip ci]" && git push)

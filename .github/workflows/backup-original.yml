name: Backup Original Docs

on:
  push:
    branches: [main]
    paths: ['public/docs/**.md']

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Backup original files
        run: |
          mkdir -p public/docs/original
          
          # Get list of changed .md files
          git diff --name-only HEAD~1 HEAD | grep '^public/docs/.*\.md$' | while read file; do
            # Check if file existed in previous commit
            if git cat-file -e HEAD~1:"$file" 2>/dev/null; then
              filename=$(basename "$file")
              # Save the ORIGINAL version (from HEAD~1, before edits)
              git show HEAD~1:"$file" > "public/docs/original/$filename"
              echo "Backed up original: $filename"
            fi
          done
      
      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/docs/original/
          if ! git diff --cached --quiet; then
            git commit -m "Backup original docs [skip ci]"
            git push
          fi

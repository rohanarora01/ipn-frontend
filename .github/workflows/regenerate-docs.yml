# Regenerate Documentation Files
# When you push a .md file change, this workflow detects it and shows the filename

name: Regenerate Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'public/docs/**.md'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Detect and show changed files
        id: detect
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  📄 CHANGED DOCUMENTATION FILES"
          echo "═══════════════════════════════════════════════════════════"
          
          # Get the list of changed .md files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^public/docs/.*\.md$' || true)
          
          if [ -n "$CHANGED_FILES" ]; then
            echo ""
            echo "✅ Files that were changed:"
            for file in $CHANGED_FILES; do
              echo "   📄 $file"
            done
            echo ""
            echo "═══════════════════════════════════════════════════════════"
            echo "  🔄 These files will be processed and committed back"
            echo "═══════════════════════════════════════════════════════════"
            
            # Save for next step
            echo "files_changed=true" >> $GITHUB_OUTPUT
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No documentation files changed"
            echo "files_changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit regenerated files
        if: steps.detect.outputs.files_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changed .md files
          git add public/docs/
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "📝 Committing regenerated files..."
            git commit -m "🤖 Regenerated documentation files [skip ci]
          
Changed files:
${{ steps.detect.outputs.changed_files }}"
            git push
            echo "✅ Files committed and pushed!"
          else
            echo "ℹ️ No changes to commit"
          fi

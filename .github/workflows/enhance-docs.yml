# Enhance Documentation using AI (Groq/Claude)
# When you push a .md file change, this uses AI to enhance it and commits back

name: Enhance Documentation with AI

on:
  push:
    branches:
      - main
    paths:
      - 'public/docs/**.md'

permissions:
  contents: write

jobs:
  enhance:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install groq  # For Groq API
          # Or: pip install anthropic  # For Claude API
      
      - name: Detect and enhance changed files
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Or: ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "  🤖 AI DOCUMENTATION ENHANCER"
          echo "═══════════════════════════════════════════════════════════"
          
          # Get changed .md files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '^public/docs/.*\.md$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "ℹ️ No documentation files changed"
            exit 0
          fi
          
          echo ""
          echo "📄 Files to enhance:"
          for file in $CHANGED_FILES; do
            echo "   • $file"
          done
          echo ""
          
          # Process each file
          for file in $CHANGED_FILES; do
            echo "═══════════════════════════════════════════════════════════"
            echo "  📝 Processing: $file"
            echo "═══════════════════════════════════════════════════════════"
            
            # Read the file content
            CONTENT=$(cat "$file")
            
            # Create a Python script to enhance the content
            python3 << PYTHON_EOF
          import os
          from groq import Groq
          
          # Get API key
          api_key = os.environ.get('GROQ_API_KEY')
          if not api_key:
              print("❌ GROQ_API_KEY not set")
              exit(1)
          
          # Read the file
          file_path = "$file"
          with open(file_path, 'r', encoding='utf-8') as f:
              content = f.read()
          
          print(f"📝 Original content length: {len(content)} characters")
          
          # Initialize Groq client
          client = Groq(api_key=api_key)
          
          # Enhance the documentation
          prompt = f"""Enhance and improve this technical documentation. Make it more detailed, clear, and professional. Keep the same structure but improve the content:

          {content}

          Provide the enhanced version only, no explanations."""
          
          try:
              response = client.chat.completions.create(
                  model="mixtral-8x7b-32768",  # or "llama3-8b-8192"
                  messages=[
                      {"role": "system", "content": "You are a technical documentation expert. Enhance and improve documentation while maintaining accuracy."},
                      {"role": "user", "content": prompt}
                  ],
                  temperature=0.3,
                  max_tokens=4000
              )
              
              enhanced = response.choices[0].message.content
              
              # Write back
              with open(file_path, 'w', encoding='utf-8') as f:
                  f.write(enhanced)
              
              print(f"✅ Enhanced and saved: {file_path}")
              print(f"📝 New content length: {len(enhanced)} characters")
              
          except Exception as e:
              print(f"❌ Error enhancing {file_path}: {e}")
              exit(1)
          
          PYTHON_EOF
            
            if [ $? -ne 0 ]; then
              echo "❌ Failed to enhance $file"
              exit 1
            fi
            
            echo ""
          done
          
          echo "═══════════════════════════════════════════════════════════"
          echo "  ✅ All files enhanced successfully!"
          echo "═══════════════════════════════════════════════════════════"
      
      - name: Commit enhanced files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changed .md files
          git add public/docs/
          
          if [ -n "$(git status --porcelain)" ]; then
            echo "📝 Committing enhanced files..."
            git commit -m "🤖 AI-enhanced documentation [skip ci]"
            git push
            echo "✅ Enhanced files committed and pushed!"
          else
            echo "ℹ️ No changes to commit"
          fi
